<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Atalaya: a relation explorer over Chile's Data Observatory open catalog. Map, join, correlate and semantically search a thousand open datasets, with a calibrated multi-evidence affinity."
    />
    <title>Atalaya · Data Observatory relation explorer</title>
    <script>
      // Apply the persisted theme before first paint to avoid a flash of the wrong palette.
      (function () {
        try {
          var saved = localStorage.getItem("caos.atalaya.theme");
          var prefersDark =
            window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = saved || (prefersDark ? "dark" : "light");
          document.documentElement.setAttribute("data-theme", theme);
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
