<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Atalaya">
  <rect width="32" height="32" rx="7" fill="#0d1117"/>
  <!-- a small relation graph: nodes + edges (the watchtower over connected data) -->
  <g stroke="#58a6ff" stroke-width="1.6" opacity="0.9">
    <line x1="16" y1="7" x2="8" y2="16"/>
    <line x1="16" y1="7" x2="24" y2="16"/>
    <line x1="8" y1="16" x2="16" y2="25"/>
    <line x1="24" y1="16" x2="16" y2="25"/>
    <line x1="8" y1="16" x2="24" y2="16"/>
  </g>
  <g fill="#58a6ff">
    <circle cx="16" cy="7" r="3.2"/>
    <circle cx="8" cy="16" r="3"/>
    <circle cx="24" cy="16" r="3"/>
    <circle cx="16" cy="25" r="3"/>
  </g>
  <circle cx="16" cy="7" r="3.2" fill="#f58518"/>
</svg>
