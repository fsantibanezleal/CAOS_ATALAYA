<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" width="900" class="arch-svg" role="img" aria-label="Atalaya lifecycle: catalog to harvest to pipeline to graph to web">
  <style>
    .arch-svg text { font-family: var(--font-sans, Inter, "Segoe UI", system-ui, sans-serif); }
    .arch-svg .mono { font-family: var(--font-mono, ui-monospace, Consolas, monospace); }
    .arch-svg .bx { fill: var(--color-surface-2); stroke: var(--color-border); stroke-width: 1.2; }
    .arch-svg .bx-a { stroke: var(--color-accent); }
    .arch-svg .bx-m { stroke: var(--color-magenta); }
    .arch-svg .bx-g { stroke: var(--color-good); }
    .arch-svg .ttl { fill: var(--color-fg); font-size: 13px; font-weight: 700; }
    .arch-svg .sub { fill: var(--color-fg-subtle); font-size: 11px; }
    .arch-svg .it { fill: var(--color-fg); font-size: 11px; font-weight: 600; }
    .arch-svg .cd { fill: var(--color-accent); font-size: 9.5px; }
    .arch-svg .mu { fill: var(--color-fg-subtle); font-size: 9.5px; }
    .arch-svg .flow { fill: none; stroke: var(--color-fg-faint); stroke-width: 1.4; }
    .arch-svg .lbl { fill: var(--color-fg-subtle); font-size: 9px; }
  </style>
  <defs>
    <marker id="a1" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L8,4 L0,8 z" fill="var(--color-fg-faint)"/>
    </marker>
  </defs>

  <text class="ttl" x="22" y="30">Atalaya — an observatory of the observatory</text>
  <text class="sub" x="22" y="48">harvest the open catalog, profile every table, mine the relations, explore the graph</text>

  <rect class="bx bx-a" x="18" y="70" width="160" height="96" rx="9"/>
  <text class="it" x="30" y="94">1 · Catalog</text>
  <text class="mu" x="30" y="112">Data Observatory,</text>
  <text class="mu" x="30" y="126">1017 datasets (OpenSearch)</text>
  <text class="cd mono" x="30" y="146">catalog/client.py</text>

  <rect class="bx bx-a" x="196" y="70" width="160" height="96" rx="9"/>
  <text class="it" x="208" y="94">2 · Harvest</text>
  <text class="mu" x="208" y="112">tier-classify + size-gate,</text>
  <text class="mu" x="208" y="126">mirror gov files offline</text>
  <text class="cd mono" x="208" y="146">stages/harvest.py</text>

  <rect class="bx bx-m" x="374" y="70" width="160" height="96" rx="9"/>
  <text class="it" x="386" y="94">3 · Profile</text>
  <text class="mu" x="386" y="112">contract, entity keys,</text>
  <text class="mu" x="386" y="126">MinHash, MiniLM embeddings</text>
  <text class="cd mono" x="386" y="146">feature_extraction.py</text>

  <rect class="bx bx-m" x="552" y="70" width="160" height="96" rx="9"/>
  <text class="it" x="564" y="94">4 · Mine + model</text>
  <text class="mu" x="564" y="112">5 relation kinds + the</text>
  <text class="mu" x="564" y="126">calibrated affinity</text>
  <text class="cd mono" x="564" y="146">infer.py · train.py</text>

  <rect class="bx bx-g" x="730" y="70" width="152" height="96" rx="9"/>
  <text class="it" x="742" y="94">5 · Knowledge graph</text>
  <text class="mu" x="742" y="112">SQLite-WAL nodes+edges,</text>
  <text class="mu" x="742" y="126">validated (neg. control)</text>
  <text class="cd mono" x="742" y="146">core/graphdb.py</text>

  <path class="flow" d="M178,118 H196" marker-end="url(#a1)"/>
  <path class="flow" d="M356,118 H374" marker-end="url(#a1)"/>
  <path class="flow" d="M534,118 H552" marker-end="url(#a1)"/>
  <path class="flow" d="M712,118 H730" marker-end="url(#a1)"/>

  <rect class="bx bx-g" x="374" y="212" width="338" height="86" rx="9"/>
  <text class="it" x="388" y="236">6 · Export (Contract 2)</text>
  <text class="mu" x="388" y="256">compact per-case artifacts + manifests + catalog + graph + embeddings</text>
  <text class="cd mono" x="388" y="276">stages/export.py to data/derived/*.json</text>
  <path class="flow" d="M700,166 Q700,200 620,210" marker-end="url(#a1)"/>

  <rect class="bx bx-a" x="18" y="212" width="300" height="86" rx="9"/>
  <text class="it" x="32" y="236">7 · Web app (replay + live)</text>
  <text class="mu" x="32" y="256">6-page SPA replays artifacts; ONNX search +</text>
  <text class="mu" x="32" y="270">affinity reweight run live in the browser</text>
  <text class="cd mono" x="32" y="288">frontend/ (React + Vite)</text>
  <path class="flow" d="M374,255 H320" marker-end="url(#a1)"/>

  <rect class="bx" x="18" y="330" width="864" height="70" rx="9"/>
  <text class="it" x="32" y="354">Also shipped: a read-only MCP server over the graph</text>
  <text class="mu" x="32" y="374">any agent can query find_related · join_path · correlations_for · search_columns</text>
  <text class="cd mono" x="32" y="392">mcp/atalaya_mcp.py</text>
  <text class="lbl" x="470" y="392">the offline pipeline + committed artifacts ARE the product; the web is a read-only projection</text>
</svg>
