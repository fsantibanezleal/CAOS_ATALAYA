<svg xmlns="http://www.w3.org/2000/svg" width="760" height="384" viewBox="0 0 760 384" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#1a1a2e"/>
    </marker>
    <marker id="arf" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#e07a3f"/>
    </marker>
  </defs>

  <!-- stage headers -->
  <text x="86"  y="26" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1a1a2e">Three orthogonal</text>
  <text x="86"  y="41" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1a1a2e">raw evidences</text>
  <text x="292" y="26" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1a1a2e">Null-CDF calibration</text>
  <text x="292" y="41" text-anchor="middle" font-size="11" fill="#555">percentile vs random pairs</text>
  <text x="500" y="26" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1a1a2e">Reliability weighting</text>
  <text x="500" y="41" text-anchor="middle" font-size="11" fill="#555">down-weight contradiction</text>
  <text x="672" y="26" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1a1a2e">Calibrated</text>
  <text x="672" y="41" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1a1a2e">affinity</text>

  <!-- ===== lane 1: semantic ===== -->
  <rect x="20" y="70" width="132" height="58" rx="8" fill="#eaf2f8" stroke="#1b6ca8" stroke-width="1.6"/>
  <text x="86" y="90"  text-anchor="middle" font-size="11.5" font-weight="bold" fill="#1b6ca8">Semantic cosine</text>
  <text x="86" y="106" text-anchor="middle" font-size="10.5" fill="#333">MiniLM embeddings</text>
  <text x="86" y="121" text-anchor="middle" font-size="10.5" fill="#333">raw = 0.83</text>

  <!-- lane 2: join -->
  <rect x="20" y="163" width="132" height="58" rx="8" fill="#eaf2f8" stroke="#1b6ca8" stroke-width="1.6"/>
  <text x="86" y="183" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#1b6ca8">Join containment</text>
  <text x="86" y="199" text-anchor="middle" font-size="10.5" fill="#333">MinHash signatures</text>
  <text x="86" y="214" text-anchor="middle" font-size="10.5" fill="#333">raw = 0.77</text>

  <!-- lane 3: statistical -->
  <rect x="20" y="256" width="132" height="58" rx="8" fill="#eaf2f8" stroke="#1b6ca8" stroke-width="1.6"/>
  <text x="86" y="276" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#1b6ca8">Statistical assoc.</text>
  <text x="86" y="292" text-anchor="middle" font-size="10.5" fill="#333">Spearman + FDR</text>
  <text x="86" y="307" text-anchor="middle" font-size="10.5" fill="#333">raw = 0.53</text>

  <!-- calibration boxes with a tiny CDF curve icon -->
  <g>
    <rect x="226" y="70" width="132" height="58" rx="8" fill="#ffffff" stroke="#1a1a2e" stroke-width="1.3"/>
    <path d="M234,120 C250,120 256,84 286,80" fill="none" stroke="#1b6ca8" stroke-width="1.8"/>
    <line x1="234" y1="120" x2="234" y2="78" stroke="#bbb" stroke-width="0.8"/>
    <line x1="234" y1="120" x2="290" y2="120" stroke="#bbb" stroke-width="0.8"/>
    <text x="330" y="96" text-anchor="middle" font-size="11" fill="#1a1a2e">f_sem</text>
    <text x="330" y="111" text-anchor="middle" font-size="10.5" fill="#333">= 0.91</text>
  </g>
  <g>
    <rect x="226" y="163" width="132" height="58" rx="8" fill="#ffffff" stroke="#1a1a2e" stroke-width="1.3"/>
    <path d="M234,213 C250,213 256,177 286,173" fill="none" stroke="#1b6ca8" stroke-width="1.8"/>
    <line x1="234" y1="213" x2="234" y2="171" stroke="#bbb" stroke-width="0.8"/>
    <line x1="234" y1="213" x2="290" y2="213" stroke="#bbb" stroke-width="0.8"/>
    <text x="330" y="189" text-anchor="middle" font-size="11" fill="#1a1a2e">f_join</text>
    <text x="330" y="204" text-anchor="middle" font-size="10.5" fill="#333">= 0.99</text>
  </g>
  <g>
    <rect x="226" y="256" width="132" height="58" rx="8" fill="#ffffff" stroke="#1a1a2e" stroke-width="1.3"/>
    <path d="M234,306 C250,306 256,270 286,266" fill="none" stroke="#1b6ca8" stroke-width="1.8"/>
    <line x1="234" y1="306" x2="234" y2="264" stroke="#bbb" stroke-width="0.8"/>
    <line x1="234" y1="306" x2="290" y2="306" stroke="#bbb" stroke-width="0.8"/>
    <text x="330" y="282" text-anchor="middle" font-size="11" fill="#1a1a2e">f_stat</text>
    <text x="330" y="297" text-anchor="middle" font-size="10.5" fill="#333">= 0.88</text>
  </g>

  <!-- reliability node -->
  <rect x="430" y="118" width="140" height="148" rx="10" fill="#eef7ef" stroke="#3fa34d" stroke-width="1.6"/>
  <text x="500" y="142" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#2f7d3a">reliability r*</text>
  <text x="500" y="163" text-anchor="middle" font-size="10" fill="#333">r_sem = 0.6 + 0.4</text>
  <text x="500" y="176" text-anchor="middle" font-size="10" fill="#333">max(f_join, f_stat)</text>
  <text x="500" y="197" text-anchor="middle" font-size="10" fill="#333">r_join = 0.85 + 0.15</text>
  <text x="500" y="210" text-anchor="middle" font-size="10" fill="#333">max(f_sem, f_stat)</text>
  <text x="500" y="231" text-anchor="middle" font-size="10" fill="#333">r_stat = 0.5 + 0.5</text>
  <text x="500" y="244" text-anchor="middle" font-size="10" fill="#333">f_join</text>
  <text x="500" y="260" text-anchor="middle" font-size="9" font-style="italic" fill="#666">a shared key is a fact</text>

  <!-- fusion box -->
  <rect x="606" y="132" width="140" height="120" rx="10" fill="#fdf1e8" stroke="#e07a3f" stroke-width="1.8"/>
  <text x="676" y="158" text-anchor="middle" font-size="12" font-weight="bold" fill="#c15a22">S(A,B)</text>
  <text x="676" y="182" text-anchor="middle" font-size="10.5" fill="#333">&#931; w* r* f*</text>
  <line x1="640" y1="188" x2="712" y2="188" stroke="#333" stroke-width="0.9"/>
  <text x="676" y="203" text-anchor="middle" font-size="10.5" fill="#333">&#931; w* r*</text>
  <text x="676" y="228" text-anchor="middle" font-size="12" font-weight="bold" fill="#c15a22">= 0.94</text>
  <text x="676" y="245" text-anchor="middle" font-size="9" font-style="italic" fill="#666">in [0,1]</text>

  <!-- arrows: raw -> calibration -->
  <line x1="152" y1="99"  x2="224" y2="99"  stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="152" y1="192" x2="224" y2="192" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="152" y1="285" x2="224" y2="285" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- arrows: calibrated f -> reliability node -->
  <line x1="358" y1="99"  x2="428" y2="150" stroke="#1a1a2e" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="358" y1="192" x2="428" y2="192" stroke="#1a1a2e" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="358" y1="285" x2="428" y2="234" stroke="#1a1a2e" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- arrow: reliability -> fusion -->
  <line x1="570" y1="192" x2="604" y2="192" stroke="#e07a3f" stroke-width="1.8" marker-end="url(#arf)"/>

  <!-- footer note -->
  <text x="380" y="356" text-anchor="middle" font-size="10.5" font-style="italic" fill="#444">Each term is reported on the edge: the score is interpretable and auditable, never an opaque number.</text>
  <text x="380" y="372" text-anchor="middle" font-size="10.5" font-style="italic" fill="#444">Pure numpy, so the browser recomputes S live when the analyst reweights the evidences.</text>
</svg>
